<!-- ════════════════════════════════════════════════════════════
     재재환경연구소 · 사이드 퀵메뉴 (전체 페이지 공통)
     - 우측 하단 고정 / 네이버 블로그 · 스마트스토어 연결
     - PC·모바일 반응형 (한 소스로 둘 다 자동 전환)
     - JS 없음(순수 <a> 링크) → 어떤 페이지에서도 클릭 보장
     - 컨테이너 pointer-events:none → 다른 영역 클릭 방해 0
     아임웹 [footer 공통코드] 또는 전체페이지 반복 섹션에 그대로 붙여넣기
     ════════════════════════════════════════════════════════════ -->
<style>
  #jjq-quick{
    position: fixed !important;
    right: 22px; bottom: 22px;
    z-index: 9990;
    pointer-events: none;              /* 컨테이너는 클릭 통과 */
    display: flex; flex-direction: column;
    gap: 12px; align-items: flex-end;
    font-family: 'Pretendard','Noto Sans KR',-apple-system,sans-serif;
  }
  #jjq-quick a{ pointer-events: auto; }  /* 실제 버튼만 클릭 받음 */

  /* ── PC 버전: 아이콘 + 라벨 알약형 ── */
  .jjq-pc{
    display: flex; align-items: center; gap: 10px;
    background: #ffffff; border: 1px solid #e6efe9;
    border-radius: 999px; padding: 7px 16px 7px 7px;
    box-shadow: 0 6px 20px rgba(10,26,16,.14);
    text-decoration: none; white-space: nowrap;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .jjq-pc:hover{ transform: translateX(-4px); box-shadow: 0 10px 28px rgba(10,26,16,.22); }
  .jjq-pc .jjq-ico{
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .jjq-pc .jjq-ico svg{ width: 19px; height: 19px; stroke: #fff; fill: none; stroke-width: 2; }
  .jjq-pc .jjq-label{ font-size: 13px; font-weight: 700; color: #0a1a10; letter-spacing: -.02em; }

  /* ── 모바일 버전: 원형 아이콘 버튼 ── */
  .jjq-mobile{
    display: none;
    width: 50px; height: 50px; border-radius: 50%;
    align-items: center; justify-content: center;
    box-shadow: 0 5px 16px rgba(10,26,16,.28);
    text-decoration: none;
  }
  .jjq-mobile svg{ width: 23px; height: 23px; stroke: #fff; fill: none; stroke-width: 2; }

  /* ── 서비스별 색상 ── */
  .jjq-blog  .jjq-ico, .jjq-mobile.jjq-blog  { background: #03c75a; } /* 네이버 블로그 */
  .jjq-store .jjq-ico, .jjq-mobile.jjq-store { background: #2a9a5a; } /* 스마트스토어 */

  /* ── 반응형 전환 ── */
  @media (max-width: 768px){
    #jjq-quick{ right: 14px; bottom: 14px; gap: 10px; }
    .jjq-pc{ display: none !important; }
    .jjq-mobile{ display: flex !important; }
  }
</style>

<div id="jjq-quick" aria-label="빠른 메뉴">
  <!-- 네이버 블로그 -->
  <a class="jjq-pc jjq-blog" href="https://blog.naver.com/jaejae-lab" target="_blank" rel="noopener">
    <span class="jjq-ico"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
    <span class="jjq-label">네이버 블로그</span>
  </a>
  <!-- 스마트스토어 -->
  <a class="jjq-pc jjq-store" href="https://smartstore.naver.com/jaejae76" target="_blank" rel="noopener">
    <span class="jjq-ico"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></span>
    <span class="jjq-label">스마트스토어</span>
  </a>

  <!-- 모바일: 네이버 블로그 -->
  <a class="jjq-mobile jjq-blog" href="https://blog.naver.com/jaejae-lab" target="_blank" rel="noopener" aria-label="네이버 블로그">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </a>
  <!-- 모바일: 스마트스토어 -->
  <a class="jjq-mobile jjq-store" href="https://smartstore.naver.com/jaejae76" target="_blank" rel="noopener" aria-label="스마트스토어">
    <svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
  </a>
</div>
